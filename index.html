<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cashflow — control de flujo de caja para PYMEs y startups. Ingresos, egresos y liquidez en tiempo real." />
    <title>Cashflow — Flujo de caja para PYMEs y startups</title>
    <!-- Fija el tema antes del primer paint para evitar flash. Sigue la preferencia
         guardada (cf_theme) o, si no hay, el esquema del sistema. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('cf_theme');
          var dark = saved === 'dark' || (saved !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
